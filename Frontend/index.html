<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAPT-Synthetix | TERMINAL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Section 1: Symmetrical Waveform -->
    <div class="visualizer-container">
        <canvas id="canvas"></canvas>
    </div>

    <!-- Section 2: Controller -->
    <div class="control-section">
        <button id="recordBtn" class="record-btn"></button>
    </div>

    <!-- Section 3: Interactive Terminal -->
    <div class="terminal-container" id="terminalContainer">
        <div class="terminal-header">
            <div class="terminal-dot" id="statusDot"></div>
            SYSTEM_TERMINAL [ACTIVE]
        </div>
        <div class="terminal-body" id="terminal">
            <div class="terminal-line" style="color: #222;">ADAPT-Synthetix Initialization... [OK]</div>
            <div id="outputArea"></div>
            <div class="input-line">
                <span class="prompt">&gt;</span>
                <input type="text" id="terminalInput" spellcheck="false" autocomplete="off" autofocus>
            </div>
        </div>
    </div>

    <script src="waveform.js"></script>
    <script src="terminal.js"></script>
    <script src="app.js"></script>
</body>
</html>
